name: Deploy to GitHub Pages

# Note: the first-ever Pages enablement for a repo has to happen once via
# Settings -> Pages -> Source: "GitHub Actions". The built-in GITHUB_TOKEN
# cannot create the Pages site itself (GitHub returns "Resource not
# accessible by integration"). Once that one-time step is done, this
# workflow deploys on every push to main with no further manual steps.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
